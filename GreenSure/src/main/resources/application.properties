spring.application.name=GreenSure
spring.datasource.url=jdbc:h2:file:./data/greensure_db
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=admin
spring.datasource.password=admin123

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET:R3JlZW5TdXJlMjAyNFNlY3JldEtleUZvckpXVFRva2VuR2VuZXJhdGlvbk11c3RCZTMyQ2hhcnNMb25n}
jwt.expiration=86400000

spring.task.scheduling.pool.size=3

server.port = 9090

# ── Email (SMTP via Gmail) ─────────────────────────────
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=
spring.mail.password=your-app-password
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true

# Frontend URL for password reset links
app.frontend-url=${FRONTEND_URL:http://localhost:4200}
