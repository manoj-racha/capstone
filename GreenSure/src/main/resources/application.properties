spring.application.name=GreenSure
spring.config.import=optional:file:.env[.properties]

# Upload directory (project-local by default for dev)
app.upload.dir=${UPLOAD_DIR:uploads}
spring.web.resources.static-locations=classpath:/static/,file:uploads/

# Multipart upload limits — must be >= the 10MB validated in FileUploadController
spring.servlet.multipart.max-file-size=11MB
spring.servlet.multipart.max-request-size=12MB
# Stable DB location (independent of process working directory).
# Override per environment with GREENSURE_DB_PATH, e.g. C:/data/greensure_db
spring.datasource.url=jdbc:h2:file:${GREENSURE_DB_PATH:C:/Hartford/capstone/data/greensure_db}
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

jwt.secret=${JWT_SECRET}
jwt.expiration=86400000

spring.task.scheduling.pool.size=3

server.port=9090

# ── Email (SMTP via Gmail) ─────────────────────────────
# Required env vars for OTP/forgot-password delivery:
# MAIL_USERNAME=<gmail address>
# MAIL_PASSWORD=<gmail app password>
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.ssl.trust=smtp.gmail.com
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
spring.mail.properties.mail.debug=false
spring.mail.default-encoding=UTF-8

# Frontend URL for password reset links
app.frontend-url=${FRONTEND_URL:http://localhost:4200}

# Optional Gmail API OAuth credentials (only needed if GmailApiConfig bean is enabled)
# GMAIL_SENDER_EMAIL, GMAIL_CLIENT_ID, GMAIL_CLIENT_SECRET, GMAIL_REFRESH_TOKEN
gmail.sender.email=${GMAIL_SENDER_EMAIL:}
gmail.client.id=${GMAIL_CLIENT_ID:}
gmail.client.secret=${GMAIL_CLIENT_SECRET:}
gmail.refresh.token=${GMAIL_REFRESH_TOKEN:}

# ── Gemini API (Google AI Studio — free tier) ───────────────
# API key: https://aistudio.google.com/app/apikey — create a key and paste below.
gemini.api.key=${GEMINI_API_KEY}
gemini.api.url=https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent

# AI feature flags (set false to disable without removing code)
ai.score.explainer.enabled=true
ai.agent.assistant.enabled=true
ai.ocr.validator.enabled=true

# AI HTTP timeout (milliseconds)
ai.request.timeout.ms=45000
# Number of retry attempts after the first call when timeout occurs.
ai.request.retries=1
# Delay between timeout retries (milliseconds). Each retry multiplies this by attempt number.
ai.request.retry.backoff.ms=1200
# When true, logs raw model response + extracted text (truncated): Vertex document analysis, checklist, OCR, Gemini explainer.
# Legacy alias: ai.diagnostic.log.raw.vertex.response
ai.diagnostic.log.raw.model.response=false

# ── Vertex AI (ADC — run: gcloud auth application-default login) ──
# Project ID from GCP Console project selector (this app uses "greensure").
vertex.ai.project.id=${VERTEX_AI_PROJECT_ID:greensure}
# Region where the model is served (Vertex Generative AI).
vertex.ai.region=${VERTEX_AI_REGION:us-central1}
# Gemini model id on Vertex (e.g. gemini-2.5-flash).
vertex.ai.model=${VERTEX_AI_MODEL:gemini-2.5-flash}
