<!-- ── REGISTER PAGE ──────────────────────────────────── -->
<div class="min-h-screen flex items-center justify-center px-4 py-8 bg-gs-bg">
    <div class="w-full max-w-lg space-y-6">

        <!-- Logo -->
        <div class="text-center">
            <a routerLink="/landing" class="text-2xl font-bold text-gs-green">
                🌿 GreenSure
            </a>
            <p class="mt-2 text-gs-muted text-sm">Create your carbon declaration account</p>
        </div>

        <!-- Register Card -->
        <div class="bg-gs-card border border-green-900/20 rounded-lg p-6 space-y-5">

            <h1 class="text-xl font-semibold text-gs-text">Register</h1>

            <!-- Error -->
            @if (errorMessage()) {
            <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg px-4 py-3">
                {{ errorMessage() }}
            </div>
            }

            <!-- Success -->
            @if (successMessage()) {
            <div class="bg-green-500/10 border border-green-500/30 text-green-400 text-sm rounded-lg px-4 py-3">
                {{ successMessage() }}
            </div>
            }

            <form (ngSubmit)="onRegister()" class="space-y-4">

                <!-- User Type Toggle -->
                <div>
                    <label class="block text-sm font-medium text-gs-muted mb-2">Account Type</label>
                    <div class="flex gap-3">
                        <button type="button" (click)="userType.set('HOUSEHOLD')" [class]="isHousehold()
                ? 'flex-1 py-2 rounded-lg font-medium bg-gs-green text-gs-bg'
                : 'flex-1 py-2 rounded-lg font-medium border border-gs-green text-gs-green'">
                            Household
                        </button>
                        <button type="button" (click)="userType.set('MSME')" [class]="!isHousehold()
                ? 'flex-1 py-2 rounded-lg font-medium bg-gs-green text-gs-bg'
                : 'flex-1 py-2 rounded-lg font-medium border border-gs-green text-gs-green'">
                            MSME
                        </button>
                    </div>
                </div>

                <!-- Full Name -->
                <div>
                    <label for="fullName" class="block text-sm font-medium text-gs-muted mb-1">Full Name</label>
                    <input id="fullName" type="text" placeholder="John Doe" [ngModel]="fullName()"
                        (ngModelChange)="fullName.set($event)" name="fullName" required class="w-full" />
                </div>

                <!-- Email & Mobile -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label for="email" class="block text-sm font-medium text-gs-muted mb-1">Email</label>
                        <input id="email" type="email" placeholder="you@example.com" [ngModel]="email()"
                            (ngModelChange)="email.set($event)" name="email" required class="w-full" />
                    </div>
                    <div>
                        <label for="mobile" class="block text-sm font-medium text-gs-muted mb-1">Mobile</label>
                        <input id="mobile" type="tel" placeholder="9876543210" [ngModel]="mobile()"
                            (ngModelChange)="mobile.set($event)" name="mobile" required class="w-full" />
                    </div>
                </div>

                <!-- Address -->
                <div>
                    <label for="address" class="block text-sm font-medium text-gs-muted mb-1">Address</label>
                    <input id="address" type="text" placeholder="123, Main Street" [ngModel]="address()"
                        (ngModelChange)="address.set($event)" name="address" required class="w-full" />
                </div>

                <!-- Pin Code, City, State -->
                <div class="grid grid-cols-1 sm:grid-cols-3 gap-4">
                    <div>
                        <label for="pinCode" class="block text-sm font-medium text-gs-muted mb-1">Pin Code</label>
                        <input id="pinCode" type="text" placeholder="560001" [ngModel]="pinCode()"
                            (ngModelChange)="pinCode.set($event)" name="pinCode" required class="w-full" />
                    </div>
                    <div>
                        <label for="city" class="block text-sm font-medium text-gs-muted mb-1">City</label>
                        <input id="city" type="text" placeholder="Bangalore" [ngModel]="city()"
                            (ngModelChange)="city.set($event)" name="city" required class="w-full" />
                    </div>
                    <div>
                        <label for="state" class="block text-sm font-medium text-gs-muted mb-1">State</label>
                        <input id="state" type="text" placeholder="Karnataka" [ngModel]="state()"
                            (ngModelChange)="state.set($event)" name="state" required class="w-full" />
                    </div>
                </div>

                <!-- ── HOUSEHOLD FIELDS ────────────────────────────── -->
                @if (isHousehold()) {
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label for="numberOfMembers" class="block text-sm font-medium text-gs-muted mb-1">
                            Family Members
                        </label>
                        <input id="numberOfMembers" type="number" placeholder="4" min="1" max="20"
                            [ngModel]="numberOfMembers()" (ngModelChange)="numberOfMembers.set($event)"
                            name="numberOfMembers" class="w-full" />
                    </div>
                    <div>
                        <label for="dwellingType" class="block text-sm font-medium text-gs-muted mb-1">
                            Dwelling Type
                        </label>
                        <select id="dwellingType" [ngModel]="dwellingType()" (ngModelChange)="dwellingType.set($event)"
                            name="dwellingType" class="w-full">
                            <option value="">Select</option>
                            <option value="APARTMENT">Apartment</option>
                            <option value="INDEPENDENT_HOUSE">Independent House</option>
                        </select>
                    </div>
                </div>
                }

                <!-- ── MSME FIELDS ─────────────────────────────────── -->
                @if (!isHousehold()) {
                <div class="space-y-4">
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="businessName" class="block text-sm font-medium text-gs-muted mb-1">
                                Business Name
                            </label>
                            <input id="businessName" type="text" placeholder="Acme Corp" [ngModel]="businessName()"
                                (ngModelChange)="businessName.set($event)" name="businessName" class="w-full" />
                        </div>
                        <div>
                            <label for="gstNumber" class="block text-sm font-medium text-gs-muted mb-1">
                                GST Number
                            </label>
                            <input id="gstNumber" type="text" placeholder="22AAAAA0000A1Z5" [ngModel]="gstNumber()"
                                (ngModelChange)="gstNumber.set($event)" name="gstNumber" class="w-full" />
                        </div>
                    </div>
                    <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                        <div>
                            <label for="businessType" class="block text-sm font-medium text-gs-muted mb-1">
                                Business Type
                            </label>
                            <select id="businessType" [ngModel]="businessType()"
                                (ngModelChange)="businessType.set($event)" name="businessType" class="w-full">
                                <option value="">Select</option>
                                <option value="MANUFACTURING">Manufacturing</option>
                                <option value="RETAIL">Retail</option>
                                <option value="SERVICE">Service</option>
                                <option value="FOOD">Food</option>
                            </select>
                        </div>
                        <div>
                            <label for="numEmployees" class="block text-sm font-medium text-gs-muted mb-1">
                                Number of Employees
                            </label>
                            <input id="numEmployees" type="number" placeholder="10" min="1" [ngModel]="numEmployees()"
                                (ngModelChange)="numEmployees.set($event)" name="numEmployees" class="w-full" />
                        </div>
                    </div>
                </div>
                }

                <!-- Password & Confirm -->
                <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
                    <div>
                        <label for="password" class="block text-sm font-medium text-gs-muted mb-1">Password</label>
                        <input id="password" type="password" placeholder="Min 8 characters" [ngModel]="password()"
                            (ngModelChange)="password.set($event)" name="password" required class="w-full" />
                    </div>
                    <div>
                        <label for="confirmPassword" class="block text-sm font-medium text-gs-muted mb-1">
                            Confirm Password
                        </label>
                        <input id="confirmPassword" type="password" placeholder="••••••••" [ngModel]="confirmPassword()"
                            (ngModelChange)="confirmPassword.set($event)" name="confirmPassword" required
                            class="w-full" />
                    </div>
                </div>

                <!-- Submit -->
                <button type="submit"
                    class="w-full bg-gs-green text-gs-bg font-semibold py-2.5 rounded-lg hover:bg-gs-green-hover transition-colors">
                    Create Account
                </button>

            </form>

            <p class="text-center text-sm text-gs-muted">
                Already have an account?
                <a routerLink="/login" class="text-gs-green hover:text-gs-green-hover font-medium">
                    Sign in
                </a>
            </p>

        </div>
    </div>
</div>
