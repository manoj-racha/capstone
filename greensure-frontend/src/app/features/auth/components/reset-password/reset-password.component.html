<!-- ── RESET PASSWORD PAGE ────────────────────────────── -->
<div class="min-h-screen flex items-center justify-center px-4 bg-gs-bg">
    <div class="w-full max-w-md space-y-6">

        <div class="text-center">
            <a routerLink="/landing" class="text-2xl font-bold text-gs-green">🌿 GreenSure</a>
            <p class="mt-2 text-gs-muted text-sm">Enter your reset token and new password</p>
        </div>

        <div class="bg-gs-card border border-green-900/20 rounded-lg p-6 space-y-5">

            <h1 class="text-xl font-semibold text-gs-text">Reset Password</h1>

            @if (errorMessage()) {
            <div class="bg-red-500/10 border border-red-500/30 text-red-400 text-sm rounded-lg px-4 py-3">
                {{ errorMessage() }}
            </div>
            }

            @if (successMessage()) {
            <div class="bg-green-500/10 border border-green-500/30 text-green-400 text-sm rounded-lg px-4 py-3">
                {{ successMessage() }}
            </div>
            }

            <form (ngSubmit)="onSubmit()" class="space-y-4">

                <!-- Reset Token -->
                <div>
                    <label for="token" class="block text-sm font-medium text-gs-muted mb-1">Reset Token</label>
                    <input id="token" type="text" placeholder="Paste your reset token" [ngModel]="token()"
                        (ngModelChange)="token.set($event)" name="token" required class="w-full" />
                </div>

                <!-- New Password -->
                <div>
                    <label for="newPassword" class="block text-sm font-medium text-gs-muted mb-1">
                        New Password
                    </label>
                    <input id="newPassword" type="password" placeholder="Min 8 characters" [ngModel]="newPassword()"
                        (ngModelChange)="newPassword.set($event)" name="newPassword" required class="w-full" />
                </div>

                <!-- Confirm Password -->
                <div>
                    <label for="confirmPassword" class="block text-sm font-medium text-gs-muted mb-1">
                        Confirm Password
                    </label>
                    <input id="confirmPassword" type="password" placeholder="••••••••" [ngModel]="confirmPassword()"
                        (ngModelChange)="confirmPassword.set($event)" name="confirmPassword" required class="w-full" />
                </div>

                <button type="submit"
                    class="w-full bg-gs-green text-gs-bg font-semibold py-2.5 rounded-lg hover:bg-gs-green-hover transition-colors">
                    Reset Password
                </button>

            </form>

            <p class="text-center text-sm text-gs-muted">
                Back to
                <a routerLink="/login" class="text-gs-green hover:text-gs-green-hover font-medium">Sign in</a>
            </p>

        </div>
    </div>
</div>
