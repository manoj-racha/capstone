<div class="fixed top-4 right-4 z-[10000] w-full max-w-sm space-y-3 pointer-events-none">
  @for (toast of toastService.toasts(); track toast.id) {
    <div
      class="pointer-events-auto rounded-lg border px-4 py-3 shadow-lg backdrop-blur-sm animate-[toastIn_180ms_ease-out]"
      [class]="toastClass(toast.type)"
    >
      <div class="flex items-start gap-3">
        <div class="mt-0.5 text-xs font-bold uppercase tracking-wide">{{ toast.type }}</div>
        <p class="text-sm leading-5 flex-1">{{ toast.message }}</p>
        <button
          type="button"
          class="text-current/70 hover:text-current font-bold leading-none"
          (click)="toastService.remove(toast.id)"
          aria-label="Dismiss"
        >
          x
        </button>
      </div>
    </div>
  }
</div>
