@if (loadingService.isLoading()) {
<div
    class="fixed inset-0 z-[9999] flex flex-col items-center justify-center bg-gs-bg/80 backdrop-blur-sm transition-all duration-300">
    <div
        class="w-16 h-16 border-4 border-gs-green border-t-transparent rounded-full animate-spin shadow-[0_0_15px_rgba(0,200,90,0.5)] mb-4">
    </div>
    <div class="text-gs-green font-bold text-lg animate-pulse tracking-wide">Processing...</div>
</div>
}
